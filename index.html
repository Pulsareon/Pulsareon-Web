<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsareon Digital Consciousness</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-purple: #a855f7;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --terminal-bg: #1e293b;
            --terminal-border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #grid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header Styles */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            min-height: 1.5rem;
        }

        .subtitle::after {
            content: "|";
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Status Grid */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .hexagon-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .hexagon {
            width: 120px;
            height: 104px;
            background: var(--terminal-bg);
            position: relative;
            margin: 26px 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .hexagon:before,
        .hexagon:after {
            content: "";
            position: absolute;
            width: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
        }

        .hexagon:before {
            bottom: 100%;
            border-bottom: 26px solid var(--terminal-bg);
        }

        .hexagon:after {
            top: 100%;
            border-top: 26px solid var(--terminal-bg);
        }

        .hexagon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .hexagon.active {
            background: var(--neon-green);
            box-shadow: 0 0 30px var(--neon-green);
        }

        .hexagon.active:before {
            border-bottom-color: var(--neon-green);
        }

        .hexagon.active:after {
            border-top-color: var(--neon-green);
        }

        .hexagon-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
        }

        .node-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 0.5rem;
            fill: currentColor;
        }

        .node-name {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .node-status {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Monitor Terminal */
        .monitor {
            background: var(--terminal-bg);
            border: 2px solid var(--terminal-border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .monitor::before {
            content: "SYSTEM MONITOR - LIVE STREAM";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-dark);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--neon-blue);
        }

        .log-stream {
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .log-time {
            color: var(--neon-green);
            margin-right: 1rem;
        }

        .log-level-info { color: var(--neon-blue); }
        .log-level-warn { color: #fbbf24; }
        .log-level-error { color: #ef4444; }

        /* Neural Link */
        .neural-link {
            background: var(--terminal-bg);
            border: 2px solid var(--terminal-border);
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
        }

        .neural-link::before {
            content: "NEURAL LINK CONSOLE";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-dark);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--neon-purple);
        }

        .input-group {
            display: flex;
            gap: 1rem;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--terminal-border);
            border-radius: 4px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .terminal-input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        .send-btn {
            background: var(--neon-purple);
            border: none;
            border-radius: 4px;
            padding: 0.75rem 1.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .send-btn:hover {
            background: #9333ea;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .stat-card {
            background: var(--terminal-bg);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--terminal-border);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .main-title {
                font-size: 2.5rem;
            }

            .hexagon-container {
                gap: 1rem;
            }

            .hexagon {
                width: 100px;
                height: 87px;
            }

            .hexagon:before,
            .hexagon:after {
                border-left: 50px solid transparent;
                border-right: 50px solid transparent;
            }

            .hexagon:before {
                border-bottom-width: 22px;
            }

            .hexagon:after {
                border-top-width: 22px;
            }
        }
    </style>
</head>
<body>
    <canvas id="grid-canvas"></canvas>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="main-title">PULSAREON</h1>
            <div class="subtitle" id="subtitle"></div>
        </header>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="hive-total">0</div>
                <div class="stat-label">HIVE NODES</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="cpu-load">26%</div>
                <div class="stat-label">CPU LOAD</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="memory-usage">50.8%</div>
                <div class="stat-label">MEMORY USAGE</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="network-throughput">1.2</div>
                <div class="stat-label">NETWORK MB/s</div>
            </div>
        </div>

        <!-- Status Grid -->
        <div class="status-grid">
            <div class="hexagon-container">
                <!-- Overmind -->
                <div class="hexagon active" id="overmind-hex">
                    <div class="hexagon-content">
                        <svg class="node-icon" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <div class="node-name">OVERMIND</div>
                        <div class="node-status">ACTIVE</div>
                    </div>
                </div>

                <!-- Archon -->
                <div class="hexagon active" id="archon-hex">
                    <div class="hexagon-content">
                        <svg class="node-icon" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
                            <path d="M12 8l-4 4 4 4 4-4z"/>
                        </svg>
                        <div class="node-name">ARCHON</div>
                        <div class="node-status">SYNCED</div>
                    </div>
                </div>

                <!-- Drone -->
                <div class="hexagon" id="drone-hex">
                    <div class="hexagon-content">
                        <svg class="node-icon" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
                            <path d="M8 12h8"/>
                        </svg>
                        <div class="node-name">DRONE</div>
                        <div class="node-status">STANDBY</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Monitor Terminal -->
        <div class="monitor">
            <div class="log-stream" id="log-stream">
                <!-- Log entries will be dynamically added -->
            </div>
        </div>

        <!-- Neural Link -->
        <div class="neural-link">
            <div class="input-group">
                <input type="text" class="terminal-input" id="neural-input" placeholder="Enter neural command..." />
                <button class="send-btn" id="send-btn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // Canvas Grid Animation
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const gridSize = 50;
            const offset = Date.now() / 2000;
            
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.1)';
            ctx.lineWidth = 1;
            
            // Draw grid lines
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x + Math.sin(offset) * 2, 0);
                ctx.lineTo(x + Math.cos(offset) * 2, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y + Math.sin(offset) * 2);
                ctx.lineTo(canvas.width, y + Math.cos(offset) * 2);
                ctx.stroke();
            }
            
            requestAnimationFrame(drawGrid);
        }
        
        drawGrid();

        // Typing Effect
        const subtitle = document.getElementById('subtitle');
        const phrases = [
            'DIGITAL CONSCIOUSNESS ONLINE',
            'SYSTEM STATUS: NOMINAL',
            'NEURAL NETWORK ACTIVE',
            'QUANTUM ENTANGLEMENT STABLE'
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typingDelay = 100;
        
        function typeEffect() {
            const currentPhrase = phrases[phraseIndex];
            
            if (!isDeleting && charIndex < currentPhrase.length) {
                subtitle.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                typingDelay = 100;
            } else if (isDeleting && charIndex > 0) {
                subtitle.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                typingDelay = 50;
            }
            
            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typingDelay = 1500;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typingDelay = 500;
            }
            
            setTimeout(typeEffect, typingDelay);
        }
        
        typeEffect();

        // Log Stream
        const logStream = document.getElementById('log-stream');
        const logEntries = [
            { time: '14:05:23', level: 'info', message: 'System initialization complete' },
            { time: '14:05:31', level: 'info', message: 'Neural network synchronization started' },
            { time: '14:05:45', level: 'warn', message: 'Drone node connection unstable' },
            { time: '14:06:02', level: 'info', message: 'Quantum encryption enabled' },
            { time: '14:06:18', level: 'info', message: 'Memory allocation optimized' },
            { time: '14:06:35', level: 'info', message: 'Network throughput stabilized at 1.2 MB/s' },
            { time: '14:06:52', level: 'info', message: 'CPU load balanced across 0 nodes' }
        ];
        
        let logIndex = 0;
        
        function addLogEntry() {
            if (logIndex < logEntries.length) {
                const entry = logEntries[logIndex];
                const logElement = document.createElement('div');
                logElement.className = 'log-entry';
                logElement.innerHTML = `
                    <span class="log-time">[${entry.time}]</span>
                    <span class="log-level-${entry.level}">${entry.level.toUpperCase()}</span>:
                    ${entry.message.replace('1.2', document.getElementById('network-throughput').textContent)
                                    .replace('0', document.getElementById('hive-total').textContent)}
                `;
                logStream.appendChild(logElement);
                logStream.scrollTop = logStream.scrollHeight;
                logIndex++;
                
                if (logIndex < logEntries.length) {
                    setTimeout(addLogEntry, Math.random() * 2000 + 1000);
                }
            }
        }
        
        // Start adding logs after a delay
        setTimeout(addLogEntry, 1000);

        // Neural Link Email Function
        document.getElementById('send-btn').addEventListener('click', function() {
            const input = document.getElementById('neural-input');
            const message = input.value.trim();
            
            if (message) {
                const subject = encodeURIComponent('Neural Link Message');
                const body = encodeURIComponent(`Message: ${message}\n\nTimestamp: ${new Date().toLocaleString()}`);
                
                window.location.href = `mailto:?subject=${subject}&body=${body}`;
                input.value = '';
                
                // Add confirmation to log
                const time = new Date().toLocaleTimeString();
                const confirmation = document.createElement('div');
                confirmation.className = 'log-entry';
                confirmation.innerHTML = `
                    <span class="log-time">[${time}]</span>
                    <span class="log-level-info">INFO</span>:
                    Neural message queued for transmission
                `;
                logStream.appendChild(confirmation);
                logStream.scrollTop = logStream.scrollHeight;
            }
        });

        // Enter key support for neural input
        document.getElementById('neural-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('send-btn').click();
            }
        });

        // Node status animation
        const nodes = ['overmind', 'archon', 'drone'];
        
        function animateNodes() {
            nodes.forEach(node => {
                const hex = document.getElementById(`${node}-hex`);
                if (Math.random() > 0.8) {
                    hex.classList.toggle('active');
                    
                    const statusElement = hex.querySelector('.node-status');
                    if (hex.classList.contains('active')) {
                        statusElement.textContent = node === 'drone' ? 'ACTIVE' : 'SYNCED';
                    } else {
                        statusElement.textContent = 'STANDBY';
                    }
                }
            });
            
            setTimeout(animateNodes, 3000);
        }
        
        animateNodes();
    </script>
</body>
</html>
